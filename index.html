<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnHub</title>
    <style>
        :root { --primary: #6366f1; --bg: #f3f4f6; --card: white; --text: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        p.subtitle { color: #6b7280; margin-top: 0; }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .controls { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
            display: flex; 
            gap: 15px; 
            flex-wrap: wrap; 
            align-items: center;
            margin-bottom: 30px; 
        }
        
        select, button { 
            padding: 12px 16px; 
            border: 1px solid #e5e7eb; 
            border-radius: 8px; 
            font-size: 1rem;
        }
        
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-weight: 500;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; 
        }
        
        .card { 
            background: var(--card); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .badge { background: #e0e7ff; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        
        h3 { margin: 0 0 10px 0; font-size: 1.25rem; }
        p { color: #4b5563; line-height: 1.5; flex-grow: 1; margin-bottom: 20px; }
        
        .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 15px; border-top: 1px solid #f3f4f6; }
        .price { font-weight: bold; font-size: 1.1rem; color: #059669; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 16px; max-width: 500px; width: 90%; position: relative; animation: slideIn 0.3s; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #9ca3af; }
        
        #dashboardSection { display: none; margin-top: 50px; border-top: 2px dashed #ddd; padding-top: 30px; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .dash-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 4px rgb(0 0 0 / 0.1); }

        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .loading { grid-column: 1/-1; text-align: center; padding: 40px; color: #6b7280; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1> LearnHub</h1>
        <p class="subtitle">Plateforme d'Apprentissage</p>
        
        <div style="margin-top:20px; font-size:0.9rem; color:#6b7280; display:flex; justify-content:center; gap:20px; align-items:center;">
             <span id="globalStats">Chargement des stats</span>
             |
             <a href="http://localhost:3000/api/export" target="_blank" style="text-decoration:none; color:var(--primary); font-weight:bold;">
                 Exporter JSON
             </a>
        </div>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Rechercher (ex: Python)..." 
               style="flex-grow:1; min-width:200px; padding:12px; border:1px solid #e5e7eb; border-radius:8px;"
               onkeyup="if(event.key === 'Enter') fetchCourses()">

        <select id="categoryFilter">
            <option value="">Toutes les catégories</option>
            <option value="Web">Web Development</option>
            <option value="Mobile">Mobile Apps</option>
            <option value="Database">Bases de données</option>
            <option value="DevOps">DevOps & Cloud</option>
            <option value="AI">Intelligence Artificielle</option>
        </select>
        
        <select id="priceSort">
            <option value="-createdAt">Plus récents</option>
            <option value="price">Prix croissant</option>
            <option value="-price">Prix décroissant</option>
            <option value="-rating.average">Meilleurs avis</option>
        </select>

        <button onclick="fetchCourses()"> Filtrer les cours</button>

        <div style="flex-grow:1; text-align:right;">
            <select id="userSelector" style="max-width:200px;">
                <option value="">Chargement.</option>
            </select>
            <button onclick="loadUserDashboard()" style="background:#4f46e5;"> Mon Espace </button>
        </div>
    </div>

    <div id="courseGrid" class="grid">
    </div>

    <div id="dashboardSection">
        <div style="display:flex; justify-content:space-between; align-items:center;">
             <h2> Mon Tableau de Bord</h2>
             <button onclick="document.getElementById('dashboardSection').style.display='none'" style="background:#ef4444;">Fermer</button>
        </div>
        <div id="dashboardContent"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="margin-top:0;">Titre</h2>
        <div class="badge" id="modalCategory" style="display:inline-block; margin-bottom:15px;">Catégorie</div>
        <p id="modalDesc">Description</p>
        
        <div style="background:#f3f4f6; padding:15px; border-radius:8px; margin:20px 0;">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <strong> Prix:</strong> <span id="modalPrice"></span>
            </div>
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <strong> Difficulté:</strong> <span id="modalDiff"></span>
            </div>
            <div style="display:flex; justify-content:space-between;">
                <strong> Durée:</strong> <span id="modalDuration"></span>
            </div>
        </div>

        <button onclick="alert('Inscription réussie (Simulation)')" style="width:100%; padding:15px; font-size:1.1rem;">S'inscrire Maintenant</button>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3000/api';
    let currentCourses = [];

    document.addEventListener('DOMContentLoaded', () => {
        fetchCourses();
        populateUserSelector();
        fetchGlobalStats(); 
    });

    async function fetchGlobalStats() {
        try {
            const res = await fetch(`${API_URL}/stats`);
            const data = await res.json();
            
            const statsDiv = document.getElementById('globalStats');
            if(data.global) {
                statsDiv.innerHTML = `
                    Users: <strong>${data.global.totalUsers}</strong> • 
                    Cours: <strong>${data.global.totalCourses}</strong> • 
                    Inscriptions: <strong>${data.global.totalEnrollments}</strong>
                `;
            }
        } catch (e) {
            console.log("Stats non disponibles");
        }
    }

    
    async function fetchCourses() {
        const category = document.getElementById('categoryFilter').value;
        const sort = document.getElementById('priceSort').value;
        const grid = document.getElementById('courseGrid');

        grid.innerHTML = '<div class="loading">Chargement des cours...</div>';

        try {
            let url = `${API_URL}/courses?sort=${sort}`;
            if(category) url += `&category=${category}`;
            
            const search = document.getElementById('searchInput').value;
            if(search) url += `&q=${encodeURIComponent(search)}`;

            const response = await fetch(url);
            if(!response.ok) throw new Error("Erreur serveur");
            
            const json = await response.json();
            const courses = json.data || [];
            currentCourses = courses; 

            displayCourses(courses);

        } catch (err) {
            console.error(err);
            grid.innerHTML = `
                <div class="loading" style="color:#ef4444;">
                     Impossible de contacter l'API.<br>
                    Vérifiez que le serveur tourne avec "node server.js"
                </div>
            `;
        }
    }

    function displayCourses(courses) {
        const grid = document.getElementById('courseGrid');
        grid.innerHTML = '';

        if(courses.length === 0) {
            grid.innerHTML = '<div class="loading">Aucun cours trouvé pour ces critères.</div>';
            return;
        }

        courses.forEach(course => {
            const priceDisplay = course.price === 0 ? 'Gratuit' : course.price + ' €';
            const ratingDisplay = course.rating?.average ? ` ${course.rating.average}` : ' Nouveau';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <span class="badge">${course.category}</span>
                    <span style="font-size:0.9rem; color:#6b7280;">${ratingDisplay}</span>
                </div>
                <h3>${course.title}</h3>
                <p>${course.description.substring(0, 80)}...</p>
                <div class="card-footer">
                    <span class="price">${priceDisplay}</span>
                    <button onclick="openModal('${course._id}')" style="background:white; color:var(--primary); border:1px solid #e5e7eb;">Détails</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }


    async function populateUserSelector() {
        const selector = document.getElementById('userSelector');
        try {
            const res = await fetch(`${API_URL}/users?role=student`);
            const users = await res.json();
            
            selector.innerHTML = '';
            if (users.length === 0) {
                 selector.innerHTML = '<option value="">Aucun étudiant</option>';
                 return;
            }
            
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u._id;
                opt.textContent = `${u.firstName} ${u.lastName}`;
                selector.appendChild(opt);
            });
        } catch (e) {
            console.error(e);
            selector.innerHTML = '<option>Erreur API</option>';
        }
    }

    async function loadUserDashboard() {
        const userId = document.getElementById('userSelector').value;
        
        if (!userId) {
            alert("Veuillez sélectionner un utilisateur dans la liste en haut.");
            return;
        }

        const dashSection = document.getElementById('dashboardSection');
        const contentDiv = document.getElementById('dashboardContent');
        
        dashSection.style.display = 'block';
        dashSection.scrollIntoView({ behavior: 'smooth' });
        contentDiv.innerHTML = '<div class="loading">Récupération des données agrégées...</div>';

        try {
            const dashRes = await fetch(`${API_URL}/users/${userId}/dashboard`);
            const data = await dashRes.json();

            const enrollList = data.activeEnrollments.map(e => `
                <li style="margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #eee;">
                    <div><strong>Cours ID:</strong> ${e.courseId}</div>
                    <div style="font-size:0.9rem; color:#666;">
                        Progression: ${e.progress.percentage}% • Statut: ${e.status}
                    </div>
                </li>
            `).join('') || '<p>Aucune inscription active.</p>';

            const reviewList = data.recentReviews.map(r => `
                <li style="margin-bottom:10px;">
                    <div>${"".repeat(r.rating)}</div>
                    <div style="font-style:italic;">"${r.comment}"</div>
                </li>
            `).join('') || '<p>Aucun avis donné.</p>';

            contentDiv.innerHTML = `
                <h3>Bonjour, ${data.user.firstName} ${data.user.lastName} </h3>
                <p>Email: ${data.user.email} | Rôle: ${data.user.role}</p>
                
                <div class="dash-grid">
                    <div class="dash-card">
                        <h4 style="margin-top:0; color:var(--primary);"> Mes Cours en cours</h4>
                        <ul style="list-style:none; padding:0; margin:0;">${enrollList}</ul>
                    </div>
                    <div class="dash-card">
                        <h4 style="margin-top:0; color:#10b981;"> Mes Derniers Avis</h4>
                         <ul style="list-style:none; padding:0; margin:0;">${reviewList}</ul>
                    </div>
                </div>
            `;

        } catch (err) {
            console.error(err);
            console.log(err);
            contentDiv.innerHTML = `<div class="loading" style="color:red;">Erreur Dashboard: ${err.message}</div>`;
        }
    }


    function openModal(courseId) {
        const course = currentCourses.find(c => c._id === courseId);
        if(!course) return;

        document.getElementById('modalTitle').textContent = course.title;
        document.getElementById('modalCategory').textContent = course.category;
        document.getElementById('modalDesc').textContent = course.description;
        document.getElementById('modalPrice').textContent = course.price + ' €';
        document.getElementById('modalDiff').textContent = course.difficulty;
        document.getElementById('modalDuration').textContent = course.duration + 'h';
        
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modal');
        if (event.target == modal) {
            closeModal();
        }
    }

    populateUserSelector();
    fetchCourses();

</script>

</body>
</html>
